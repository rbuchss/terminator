bind -Tcopy-mode-vi 'v' send -X begin-selection
bind -Tcopy-mode-vi 'C-v' send -X rectangle-toggle

# copy-selection-and-cancel writes to tmux's internal paste buffer.
# With set-clipboard on, tmux also emits an OSC 52 escape sequence to
# the terminal whenever the buffer changes. The terminal interprets
# OSC 52 as a clipboard write, so yanks land on the system clipboard.
#
# In nested tmux sessions, each layer with set-clipboard on both
# stores the OSC 52 payload in its own buffer and forwards the
# sequence outward. This chains through any nesting depth, including
# over SSH, without extra tooling.
#
# If the terminal does not support OSC 52, the escape sequence is
# silently ignored and the internal buffer still works (paste with
# prefix + ]).
bind -Tcopy-mode-vi 'y' send -X copy-selection-and-cancel
